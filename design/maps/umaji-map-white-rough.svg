  <text x="65" y="155" class="small">北 ↑</text>

  <!-- My Maps has one shared registered point named "馬路森林鉄道 インクライン". -->
  <g id="forest-railway-incline" data-lat="33.5569736" data-lng="134.0489913" data-svg-x="527.2" data-svg-y="176.5" data-registration="shared-point" transform="translate(527.2 176.5)"><circle r="13" class="pin"/><circle r="5" class="pin-core"/></g>
  <path class="leader" d="M527.2 176.5H330"/><rect x="55" y="142" width="275" height="70" rx="10" class="panel"/><text x="72" y="171" class="label">馬路村森林鉄道／インクライン</text><text x="72" y="194" class="tiny">マイマップ登録名: 馬路森林鉄道 インクライン</text>

  <!--
    Confirmed My Maps markers. All seven center-map pins use one linear projection:
    x = 275 + (lng - 134.0466897) / (134.0494737 - 134.0466897) * 305
    y = 205 + (33.5566774 - lat) / (33.5566774 - 33.5492511) * 715
    Therefore larger longitude moves right, and larger latitude moves up.
  -->
  <g id="umaji-onsen" data-lat="33.5566774" data-lng="134.0491971" data-svg-x="549.7" data-svg-y="205.0" transform="translate(549.7 205.0)"><circle r="13" class="pin"/><circle r="5" class="pin-core"/></g>
  <path class="leader" d="M549.7 205H665"/><rect x="665" y="179" width="170" height="52" rx="10" class="panel"/><text x="680" y="211" class="label">うまじ温泉</text>

