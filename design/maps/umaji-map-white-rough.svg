  <g id="kinrinji" data-lat="33.5504860" data-lng="134.0466897" data-svg-x="275.0" data-svg-y="801.1" transform="translate(275.0 801.1)"><circle r="13" class="pin"/><circle r="5" class="pin-core"/></g>
  <path class="leader" d="M275 801.1L210 846"/><rect x="55" y="831" width="155" height="52" rx="10" class="panel"/><text x="72" y="863" class="label">金林寺</text>

  <g id="makaichotteya" data-lat="33.5497498" data-lng="134.0494737" data-projected-svg-x="580.0" data-projected-svg-y="872.0" data-svg-x="635.0" data-svg-y="872.0" data-display-adjustment="55px east toward roadside land" transform="translate(635.0 872.0)"><circle r="13" class="pin"/><circle r="5" class="pin-core"/></g>
