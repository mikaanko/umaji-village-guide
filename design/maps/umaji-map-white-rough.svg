  <g id="gomi-tunnel" data-lat="33.5492511" data-lng="134.0493940" data-svg-x="571.3" data-svg-y="920.0" transform="translate(571.3 920.0)"><circle r="13" class="pin"/><circle r="5" class="pin-core"/></g>
  <path class="leader" d="M571.3 920H635"/><rect x="635" y="914" width="220" height="52" rx="10" class="panel"/><text x="650" y="946" class="label">五味隧道</text>

  <text x="55" y="1090" class="tiny">※ ピン位置は登録座標比を基礎にし、ラベルのみ読みやすさのため左右へ移動。</text>

  <!-- Outlying spot is intentionally separated instead of compressed into the center map. -->
  <rect x="45" y="1155" width="810" height="185" rx="18" class="inset"/>
  <text x="70" y="1192" class="label">郊外スポット｜中心部から車で移動</text>
  <circle cx="210" cy="1262" r="10" fill="#d06a3e"/><text x="232" y="1268" class="small">中心部</text>
  <path d="M310 1260H590" stroke="#98ad9e" stroke-width="3" stroke-dasharray="10 8" marker-end="url(#none)"/>
  <text x="405" y="1245" class="tiny">南東へ概算 約3.2km</text>
  <g id="asahideyama-osugi" data-lat="33.5269934" data-lng="134.0696539" data-svg-x="635" data-svg-y="1262" data-projection="separate-inset-not-to-scale"><circle cx="635" cy="1262" r="15" fill="#fff" stroke="#637c55" stroke-width="4"/><circle cx="635" cy="1262" r="6" fill="#637c55"/></g>
  <text x="665" y="1268" class="label">朝日出山の大杉</text>
