  <g id="umaji-bakery" data-lat="33.5517314" data-lng="134.0478123" data-svg-x="398.0" data-svg-y="681.2" transform="translate(398.0 681.2)"><circle r="13" class="pin"/><circle r="5" class="pin-core"/></g>
  <path class="leader" d="M398 681.2H275"/><rect x="55" y="655" width="220" height="52" rx="10" class="panel"/><text x="72" y="687" class="label">うまじのパン屋</text>

