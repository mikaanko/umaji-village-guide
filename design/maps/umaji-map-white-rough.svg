  <path id="route-12-centerline" class="road" d="M610 125 C690 160 698 205 660 250 C620 292 515 302 480 332 C445 375 485 470 520 555 C535 630 535 700 545 770 C555 825 635 845 670 890 C700 930 690 985 660 1030 C635 1065 615 1090 600 1120"/>
