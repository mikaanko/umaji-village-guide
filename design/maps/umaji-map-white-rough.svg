<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1400" viewBox="0 0 900 1400" role="img" aria-labelledby="title desc">
  <title id="title">馬路村中心部 白地図ラフ</title>
  <desc id="desc">Googleマイマップの登録10点、主要11名称を基準にした中心部の配置ラフ。</desc>
  <defs>
    <style>
      .title{font:700 30px sans-serif;fill:#28352f}.sub{font:14px sans-serif;fill:#52635a}.label{font:600 17px sans-serif;fill:#28352f}.small{font:14px sans-serif;fill:#52635a}.tiny{font:12px sans-serif;fill:#65756c}.pin{fill:#fff;stroke:#d06a3e;stroke-width:4}.pin-core{fill:#d06a3e}.leader{fill:none;stroke:#78877f;stroke-width:2}.tbd{fill:#fffdf7;stroke:#c39648;stroke-width:2;stroke-dasharray:8 6}.water{fill:none;stroke:#a8dbea;stroke-width:32;stroke-linecap:round}.water-edge{fill:none;stroke:#7fc3d8;stroke-width:2}.road{fill:none;stroke:#b8aa94;stroke-width:12;stroke-linecap:round}.road-center{fill:none;stroke:#f6f2e9;stroke-width:2;stroke-dasharray:10 10}.forest{fill:#edf5e9;stroke:#d8e8d2;stroke-width:2}.panel{fill:#fff;stroke:#d8dfda;stroke-width:2}.inset{fill:#f8fbf6;stroke:#98ad9e;stroke-width:2;stroke-dasharray:8 6}
    </style>
  </defs>

  <rect width="900" height="1400" fill="#fbfcfa"/>
